name: Deploy-to-EC2-Staging

on:
  push:
    branches:
      - staging

jobs:
  deploy:
    name: Deploy Node.js app to EC2 (staging)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout the files
        uses: actions/checkout@v2

      - name: Deploy project files to EC2
        uses: easingthemes/ssh-deploy@main
        env:
          EC2_SSH_KEY: ${{ secrets.EC2_SSH_KEY }}
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          PROJECT_PATH: ${{ secrets.PROJECT_PATH }}

      - name: Setup and start application
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Go to app directory and install dependencies
            cd ${{ secrets.PROJECT_PATH }}
            npm install --production
            
            # Create environment file
            cat > .env << EOF
            NODE_ENV=staging
            PORT=8000
            MONGODB_URL=${{ secrets.MONGODB_URL }}
            JWT_SECRET=${{ secrets.JWT_SECRET }}
            EOF
            
            # Stop existing PM2 processes
            pm2 stop all || true
            pm2 delete all || true
            
            # Start the application with PM2
            if [ -f "ecosystem.config.js" ]; then
              pm2 start ecosystem.config.js --env staging
            else
              pm2 start app.js --name "staging-app" --env staging
            fi
            
            # Save PM2 configuration
            pm2 save
            pm2 startup || true
            
            # Wait for the service to start
            sleep 5
            
            # Check if PM2 process is running
            pm2 status
            
            # Configure Nginx reverse proxy
            sudo tee /etc/nginx/sites-available/staging-app > /dev/null <<EOF
            server {
                listen 80;
                server_name ${{ secrets.EC2_HOST }} _;
                
                location / {
                    proxy_pass http://localhost:8000;
                    proxy_http_version 1.1;
                    proxy_set_header Upgrade \$http_upgrade;
                    proxy_set_header Connection 'upgrade';
                    proxy_set_header Host \$host;
                    proxy_set_header X-Real-IP \$remote_addr;
                    proxy_set_header X-Forwarded-For \$proxy_add_x_forwarded_for;
                    proxy_set_header X-Forwarded-Proto \$scheme;
                    proxy_cache_bypass \$http_upgrade;
                }
                
                # Health check endpoint
                location /health {
                    access_log off;
                    return 200 "healthy staging\n";
                    add_header Content-Type text/plain;
                }
            }
            EOF
            
            # Enable site and restart nginx
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo ln -sf /etc/nginx/sites-available/staging-app /etc/nginx/sites-enabled/
            sudo nginx -t
            sudo systemctl reload nginx
            
            echo "Staging deployment completed successfully!"
            echo "Your staging app should now be accessible at: http://${{ secrets.EC2_HOST }}/"

  cleanup:
    name: Cleanup old files
    runs-on: ubuntu-latest
    needs: [deploy]
    if: success()
    
    steps:
      - name: Clean up server resources
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Clean PM2 logs
            pm2 flush || true
            
            # Clean npm cache
            npm cache clean --force || true
            
            # Clean old log files
            find ${{ secrets.PROJECT_PATH }} -name "*.log" -mtime +7 -delete || true
            find /tmp -name "npm-*" -mtime +1 -exec rm -rf {} + || true
            
            echo "✅ Cleanup completed"