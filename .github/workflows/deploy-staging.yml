name: Staging CI/CD Pipeline

on:
  push:
    branches: [ staging ]
  pull_request:
    branches: [ staging ]

env:
  NODE_VERSION: '18'

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to AWS EC2
    if: github.ref == 'refs/heads/staging' && github.event_name == 'push'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Deploy to EC2
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        EC2_PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
        MONGODB_URI: ${{ secrets.MONGODB_URI }}
        JWT_SECRET: ${{ secrets.JWT_SECRET }}
        NODE_ENV: staging
      run: |
        mkdir -p ~/.ssh
        echo "$EC2_PRIVATE_KEY" > ec2_key.pem
        chmod 600 ec2_key.pem
        ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

        ssh -i ec2_key.pem $EC2_USERNAME@$EC2_HOST << 'EOF'
          set -e
          mkdir -p ~/.ssh
          if ! grep -q "github.com" ~/.ssh/known_hosts 2>/dev/null; then
            ssh-keyscan github.com >> ~/.ssh/known_hosts
          fi

          cd $PROJECT_PATH
          git remote set-url origin https://github.com/LepharamRamchiary/mern-payment-gatway-ci-cd
          git fetch origin
          git checkout staging
          git pull origin staging

          npm ci --only=production

          cat > .env << ENVEOF
        NODE_ENV=staging
        PORT=8000
        MONGODB_URI=$MONGODB_URI
        JWT_SECRET=$JWT_SECRET
        ENVEOF

          if [ -f "package.json" ] && grep -q "\"build\":" package.json; then
            npm run build
          fi

          pm2 stop all || true
          pm2 delete all || true

          if [ -f "ecosystem.config.js" ]; then
            pm2 start ecosystem.config.js --env staging
          else
            pm2 start app.js --name "nodejs-app" --env staging
          fi

          pm2 save
          sudo env PATH=$PATH:/usr/bin pm2 startup systemd -u ubuntu --hp /home/ubuntu

          node -e "
            const mongoose = require('mongoose');
            mongoose.connect('$MONGODB_URI')
              .then(() => { console.log('✅ MongoDB OK'); process.exit(0); })
              .catch(err => { console.error('❌ MongoDB fail:', err.message); process.exit(1); });
          " || echo "⚠️ MongoDB connection test failed"

          sudo nginx -t
          sudo systemctl reload nginx

          echo '=== PM2 Status ==='
          pm2 status
          echo '=== Nginx Status ==='
          sudo systemctl status nginx --no-pager --lines=5
          echo '=== Recent PM2 Logs ==='
          pm2 logs --lines 10 --nostream
        EOF

        rm ec2_key.pem

    - name: Health check
      run: |
        sleep 15
        echo "🔍 Performing health check..."
        response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/api/v1/healthcheck 2>/dev/null || echo "000")
        if [ "$response" = "200" ]; then
          echo "✅ Health check passed (HTTP $response)"
        elif [ "$response" = "000" ]; then
          echo "⚠️ Health check not reachable, trying root endpoint..."
          response=$(curl -s -o /dev/null -w "%{http_code}" http://${{ secrets.EC2_HOST }}/ 2>/dev/null || echo "000")
          if [ "$response" = "200" ]; then
            echo "✅ Root endpoint OK (HTTP $response)"
          else
            echo "❌ App not responding (HTTP $response)"
            exit 1
          fi
        else
          echo "❌ Health check failed (HTTP $response)"
          curl -v http://${{ secrets.EC2_HOST }}/api/v1/healthcheck || true
          exit 1
        fi

    - name: Notify deployment status
      if: always()
      run: |
        if [ "${{ job.status }}" == "success" ]; then
          echo "✅ Deployment successful to staging!"
          echo "🚀 App running at http://${{ secrets.EC2_HOST }}"
        else
          echo "❌ Deployment failed!"
          exit 1
        fi

  cleanup:
    runs-on: ubuntu-latest
    name: Cleanup
    needs: [deploy]
    if: always()
    
    steps:
    - id: clean_build
      name: Clean up build artifacts
      run: |
        echo "🧹 Cleaning up CI/CD build artifacts..."
        rm -rf node_modules/.cache || true
        echo "✅ Build artifacts cleaned"

    - id: clean_server
      name: Clean up server resources
      if: success()
      env:
        EC2_HOST: ${{ secrets.EC2_HOST }}
        EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
        EC2_PRIVATE_KEY: ${{ secrets.EC2_PRIVATE_KEY }}
        PROJECT_PATH: ${{ secrets.PROJECT_PATH }}
      run: |
        mkdir -p ~/.ssh
        echo "$EC2_PRIVATE_KEY" > ec2_key.pem
        chmod 600 ec2_key.pem
        ssh-keyscan -H $EC2_HOST >> ~/.ssh/known_hosts

        ssh -i ec2_key.pem $EC2_USERNAME@$EC2_HOST << 'EOF'
          echo "🧹 Cleaning server..."
          find /home/ubuntu/.pm2/logs -name "*.log" -mtime +7 -delete || true
          pm2 flush || true
          npm cache clean --force || true
          cd $PROJECT_PATH
          [ -d "node_modules.backup" ] && rm -rf node_modules.backup
          find /tmp -name "npm-*" -mtime +1 -exec rm -rf {} + || true
          find . -name "*.log" -mtime +7 -delete || true
          df -h /
          echo "✅ Server cleanup done"
        EOF

        rm ec2_key.pem

    - name: Final cleanup report
      if: always()
      run: |
        echo "🎯 Cleanup Summary:"
        echo "==================="
        if [ "${{ steps.clean_build.outcome }}" = "success" ]; then
          echo "✅ Build artifacts cleanup: SUCCESS"
        else
          echo "❌ Build artifacts cleanup: FAILED"
        fi
        if [ "${{ steps.clean_server.outcome }}" = "success" ]; then
          echo "✅ Server resources cleanup: SUCCESS"
        else
          echo "⚠️ Server resources cleanup: SKIPPED or FAILED"
        fi
        echo "🏁 Cleanup completed"
